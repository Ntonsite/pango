global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend http_front
    bind *:80
    
    # Check if request is for API
    acl is_api path_beg /api
    
    # Route to API if true, else route to frontend
    use_backend api_backend if is_api
    default_backend frontend_backend

backend api_backend
    # Strip /api from the request before forwarding to backend
    http-request replace-path /api(/)?(.*) /\2
    server api pango-api:8000 check

backend frontend_backend
    server web pango-web:80 check

frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
